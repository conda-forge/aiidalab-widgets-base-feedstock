{% set name = "aiidalab-widgets-base" %}
{% set version = "3.0.0a0" %}
{% set python_min = "3.12" %}
{% set sha256 = "2ef5ca47d425eeb81d8eaa112eee7cbd52ba071f25194b08bdc1d05fe522c886" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aiidalab_widgets_base-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  # We can only support linux because of 'povray' dependency
  # https://github.com/conda-forge/povray-feedstock/blob/a0b75ca48b7767ba4f5b4bb0c5ff2d4a15b85f71/recipe/meta.yaml#L14
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pycifrw >=4.4,<5.dev0
    - aiida-core >=2.7,<3.dev0
    - aiidalab >=21.11.2
    - ansi2html >=1.7,<2.dev0
    - ase >=3.18,<4.dev0
    - bokeh >=2.4,<3.dev0
    - numpy >=1.26,<2.dev0
    - humanfriendly >=10.0,<11.dev0
    - ipytree >=0.2,<1.dev0
    - traitlets >=5.4,<6.dev0
    - ipywidgets >=8.1,<9.dev0
    - pymysql >=0.9,<1.dev0
    - nglview >=3.0.8,<4.dev0
    - spglib >=1.14,<3
    - vapory >=0.1.2,<0.2.dev0
    - pandas >=2.2,<3.dev0
    - ipython >=7.33,<9.0.dev0

test:
  imports:
    - aiidalab_widgets_base
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/aiidalab/aiidalab-widgets-base
  summary: Reusable widgets for AiiDAlab applications.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - edan-bainglass
    - danielhollas
    - yakutovicha
